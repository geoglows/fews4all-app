<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FEWS Share · Grid</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nav: "#81d4fa",
            panel: "#FEFDFD",
          },
        },
      },
    };
  </script>

  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="h-full">
  <div id="app" class="flex flex-col h-screen">

    <header id="topbar" class="flex items-center justify-between gap-4 h-[70px] px-4 bg-nav border-b border-sky-700/30 shrink-0">
      <div class="flex items-center gap-4 min-w-0">
        <img src="geoglows-logo-nav.png" alt="GEOGLOWS" class="h-8 w-auto shrink-0" />
        <div class="min-w-0">
          <h1 class="text-black font-bold text-base leading-tight">FEWS Share</h1>
          <p class="text-slate-800/80 text-xs truncate">Multi-Model Global Flood Early Warning System</p>
        </div>
      </div>
      <div id="legend" class="flex flex-wrap gap-3 justify-end"></div>
    </header>

    <main id="main" class="flex flex-1 min-h-0">
      <div id="map" class="flex-1 h-full bg-[#0b1017]"></div>

      <aside id="panel" class="shrink-0 w-[360px] h-full overflow-y-auto bg-panel border-l border-slate-200 p-4 flex flex-col">
        <div id="model-toggle" class="shrink-0"></div>

        <div id="panel-empty" class="flex-1 flex flex-col items-center text-center text-slate-500 mt-10">
          <iconify-icon icon="heroicons:cursor-arrow-rays" class="text-4xl text-sky-500 mb-3"></iconify-icon>
          <h2 class="text-slate-800 font-semibold text-[15px] mb-1">No cell selected</h2>
          <p class="text-sm leading-relaxed max-w-[240px]">Click a highlighted grid cell on the map to see every forecast inside it.</p>
        </div>

        <div id="panel-content" class="flex-1" hidden></div>
      </aside>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="app.js"></script>
</body>
</html>
